<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple ID Card</title>
    <style>
        /* --- RESET & TRANG TRÍ NỀN --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #fdf5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* --- KHUNG THẺ CHUNG --- */
        .card {
            width: 450px;
            height: 270px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(244, 143, 177, 0.25);
            position: relative;
            overflow: hidden;
            border: 1px solid #ffdde5;
        }

        /* ==========================================
           MẶT TRƯỚC (FRONT CARD)
           ========================================== */
        .front-card {
            display: flex;
            flex-direction: column;
        }

        /* Header dải màu hồng được thu nhỏ lại, không quá dài */
        .front-top {
            height: 70px;
            background: linear-gradient(135deg, #ffafbd, #ffc3a0);
            position: relative;
        }

        /* Khối màu hồng đậm lượn góc bên trái */
        .front-top::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 55%;
            height: 100%;
            background: #f48fb1;
            clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%);
        }

        /* Box chữ COUPLE ID CARD được dời qua bên trái và làm to lên */
        .logo-area {
            position: absolute;
            top: 18px;
            left: 25px;
            display: flex;
            align-items: center;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.25);
            padding: 6px 18px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .logo-text {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Thân dưới mặt trước */
        .front-body {
            display: flex;
            padding: 15px 25px;
            height: calc(100% - 70px);
            justify-content: space-between;
            align-items: center;
        }

        /* Thông tin chữ bên trái */
        .info-fields {
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
        }

        .best-couple-title {
            font-size: 18px;
            font-weight: 800;
            color: #d81b60;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field {
            display: flex;
            font-size: 14px;
            align-items: center;
        }

        .label {
            width: 75px;
            font-weight: bold;
            color: #880e4f;
        }

        .value {
            color: #4c1130;
            font-weight: 600;
        }

        /* Khu vực ảnh màu vàng */
        .right-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 140px;
            margin-top: -5px; 
            z-index: 2;
            gap: 10px;
        }

        .photo-box {
            width: 120px;
            height: 120px;
            border: 4px solid #ffffff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(244, 143, 177, 0.4);
            background: #fce4ec;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Box chữ #loveyouforever */
        .love-forever-box {
            background: #f48fb1;
            color: #ffffff;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 2px 6px rgba(244, 143, 177, 0.3);
        }

        /* Thanh trang trí đáy hồng đậm */
        .front-bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: #e91e63;
        }

        /* ==========================================
           MẶT SAU (BACK CARD)
           ========================================== */
        .back-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
            background: #ffffff;
        }

        .back-top-bar {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            height: 20px;
            background: #f48fb1;
        }

        .back-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
            height: 100%;
            gap: 10px;
        }

        /* Vùng chứa mã QR bên trái */
        .qr-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            margin-top: 25px; /* Giúp cân bằng trục ngang với phần còn lại */
        }

        .qr-box {
            width: 110px;
            height: 110px;
            border: 2px solid #fff0f3;
            border-radius: 12px;
            padding: 5px;
            background: #fff;
            box-shadow: 0 4px 10px rgba(244, 143, 177, 0.15);
        }

        .qr-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .qr-hint {
            font-size: 8px;
            color: #ad1457;
            font-weight: 500;
        }

        /* Thiết kế lại phần văn bản ở giữa cho đẹp và nhỏ gọn hơn */
        .text-zone {
            flex: 1;
            text-align: center;
            padding: 0 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 25px;
        }

        .text-zone h3 {
            font-size: 14px;
            color: #d81b60;
            margin-bottom: 6px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .text-zone p {
            font-size: 10px; /* Thu nhỏ chữ lại theo yêu cầu */
            color: #662249;
            line-height: 1.5;
            font-weight: 500;
            max-width: 160px;
        }

        .text-zone .purpose-title {
            margin-top: 6px; 
            font-weight: bold; 
            color: #e91e63;
            font-size: 10.5px;
        }

        /* Khung quét mã Spotify */
        .spotify-box {
            width: 125px;
            height: 28px;
            background: #ffffff; 
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            padding: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .spotify-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Vùng chứa ảnh vân tay bên phải - Di chuyển lên trên để ngang hàng đối diện */
        .right-back-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 25px; /* Đã tinh chỉnh để cân bằng trục ngang tuyệt đối với QR-box */
        }

        /* Khung ảnh vân tay trái tim */
        .back-photo-box {
            width: 110px;
            height: 110px;
            border: 3px solid #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(244, 143, 177, 0.2);
            background: #fce4ec;
        }

        .back-photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Tối ưu hiển thị tốt hơn trên màn hình nhỏ di động */
        @media (max-width: 480px) {
            .card {
                width: 340px;
                height: 210px;
                border-radius: 15px;
            }
            .front-top { height: 55px; }
            .logo-area { top: 12px; left: 15px; padding: 4px 12px; }
            .logo-text { font-size: 12px; }
            .front-body { padding: 10px 15px; height: calc(100% - 55px); }
            .best-couple-title { font-size: 14px; }
            .right-zone { margin-top: -5px; width: 95px; gap: 6px;}
            .photo-box { width: 85px; height: 85px; border-radius: 10px; }
            .love-forever-box { font-size: 8px; padding: 2px 8px; }
            .field { font-size: 11px; }
            .label { width: 55px; }
            
            .back-content { margin-top: 15px; }
            .text-zone { margin-top: 15px; }
            .text-zone h3 { font-size: 11px; margin-bottom: 2px; }
            .text-zone p { font-size: 8px; max-width: 120px; line-height: 1.3; }
            .text-zone .purpose-title { font-size: 8.5px; margin-top: 3px; }
            .qr-zone { margin-top: 15px; }
            .qr-box { width: 80px; height: 80px; border-radius: 8px; }
            .spotify-box { width: 90px; height: 22px; margin-top: 6px; }
            .right-back-zone { margin-top: 15px; }
            .back-photo-box { width: 80px; height: 80px; border-radius: 8px; }
        }
    </style>
</head>
<body>

    <!-- ==========================================
       MẶT TRƯỚC (FRONT CARD)
       ========================================== -->
    <div class="card front-card">
        <div class="front-top">
            <!-- Box chữ dời qua bên trái và làm to lên -->
            <div class="logo-area">
                <div class="logo-text">Couple ID Card</div>
            </div>
        </div>
        
        <div class="front-body">
            <div class="info-fields">
                <div class="best-couple-title">Best Couple</div>
                
                <div class="field">
                    <div class="label">Id Card</div>
                    <div class="value">Hữu Duy & Như Quỳnh🍊</div>
                </div>
                <div class="field">
                    <div class="label">Age</div>
                    <div class="value">2008 & 2008</div>
                </div>
                <div class="field">
                    <div class="label">Rela</div>
                    <div class="value">Dating</div>
                </div>
                <div class="field">
                    <div class="label">Date</div>
                    <div class="value">07-03-2026</div>
                </div>
            </div>

            <div class="right-zone">
                <div class="photo-box">
                    <img src="memory 15.jpg" alt="Chỗ để ảnh cặp đôi">
                </div>
                <div class="love-forever-box">#loveyouforever</div>
            </div>
        </div>
        <div class="front-bottom-bar"></div>
    </div>

    <!-- ==========================================
       MẶT SAU (BACK CARD)
       ========================================== -->
    <div class="card back-card">
        <div class="back-top-bar"></div>
        
        <div class="back-content">
            <!-- Cột chứa mã QR bên trái -->
            <div class="qr-zone">
                <div class="qr-box">
                    <img src="audio2.png" alt="Mã QR Ghi Âm">
                </div>
                <div class="qr-hint">Quét mã để kích hoạt giọng nói</div>
            </div>

            <!-- Cột chữ ở giữa được thu nhỏ lại và thiết kế đẹp mắt hơn -->
            <div class="text-zone">
                <h3>Couple ID Card</h3>
                <p>Dùng để nhận diện các cặp đôi đang trong một mối quan hệ.</p>
                <p class="purpose-title">Mục đích sử dụng:</p>
                <p>Khẳng định chủ quyền, vui lòng luôn mang theo bên mình.</p>
                
                <div class="spotify-box">
                    <img src="mã.png" alt="Spotify Code">
                </div>
            </div>

            <!-- Cột chứa ảnh vân tay bên phải (Trái tim nhỏ phía trên đã được xóa, đẩy khung ảnh lên cân đối) -->
            <div class="right-back-zone">
                <div class="back-photo-box">
                    <img src="heart.png" alt="Chỗ để ảnh mặt sau">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
