<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple ID Card</title>
    <style>
        /* --- RESET & TRANG TRÍ NỀN --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #fdf5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* --- KHUNG THẺ CHUNG --- */
        .card {
            width: 450px;
            height: 270px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(244, 143, 177, 0.25);
            position: relative;
            overflow: hidden;
            border: 1px solid #ffdde5;
        }

        /* ==========================================
           MẶT TRƯỚC (FRONT CARD)
           ========================================== */
        .front-card {
            display: flex;
            flex-direction: column;
        }

        .front-top {
            height: 70px;
            background: linear-gradient(135deg, #ffafbd, #ffc3a0);
            position: relative;
        }

        .front-top::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 55%;
            height: 100%;
            background: #f48fb1;
            clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%);
        }

        .logo-area {
            position: absolute;
            top: 18px;
            left: 25px;
            display: flex;
            align-items: center;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.25);
            padding: 6px 18px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .logo-text {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .front-body {
            display: flex;
            padding: 15px 25px;
            height: calc(100% - 70px);
            justify-content: space-between;
            align-items: center;
        }

        .info-fields {
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
        }

        .best-couple-title {
            font-size: 18px;
            font-weight: 800;
            color: #d81b60;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field {
            display: flex;
            font-size: 14px;
            align-items: center;
        }

        .label {
            width: 75px;
            font-weight: bold;
            color: #880e4f;
        }

        .value {
            color: #4c1130;
            font-weight: 600;
        }

        .right-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 140px;
            margin-top: -5px; 
            z-index: 2;
            gap: 10px;
        }

        .photo-box {
            width: 120px;
            height: 120px;
            border: 4px solid #ffffff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(244, 143, 177, 0.4);
            background: #fce4ec;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .love-forever-box {
            background: #f48fb1;
            color: #ffffff;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 2px 6px rgba(244, 143, 177, 0.3);
        }

        .front-bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: #e91e63;
        }

        /* ==========================================
           MẶT SAU (BACK CARD) - CĂN GIỮA TOÀN DIỆN
           ========================================== */
        .back-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            background: #ffffff;
        }

        .back-top-bar {
            position: absolute;
            top: 0; /* Đưa sát lên mép trên cùng giống ảnh mẫu */
            left: 0;
            width: 100%;
            height: 18px;
            background: #f48fb1;
        }

        /* Khung chứa chính: Căn giữa tuyệt đối theo chiều dọc */
        .back-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            margin-top: 10px; /* Nhường chỗ cho thanh hồng trên cùng */
            gap: 5px;
        }

        /* Vùng chứa mã QR bên trái */
        .qr-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .qr-box {
            width: 115px;
            height: 115px;
            border: 2px solid #fff0f3;
            border-radius: 12px;
            padding: 5px;
            background: #fff;
            box-shadow: 0 4px 10px rgba(244, 143, 177, 0.12);
        }

        .qr-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .qr-hint {
            font-size: 8px;
            color: #ad1457;
            font-weight: 500;
            white-space: nowrap;
        }

        /* Vùng nội dung chữ ở giữa */
        .text-zone {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Khung chứa tim nhỏ phía trên chữ */
        .mini-heart-box {
            width: 20px;
            height: 20px;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mini-heart-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .text-zone h3 {
            font-size: 14px;
            color: #d81b60;
            margin-bottom: 4px;
            font-weight: 800;
            letter-spacing: 0.3px;
        }

        .text-zone p {
            font-size: 8.5px; 
            color: #662249;
            line-height: 1.35;
            font-weight: 500;
            max-width: 155px;
        }

        .text-zone .purpose-title {
            margin-top: 3px; 
            font-weight: bold; 
            color: #e91e63;
            font-size: 9px;
        }

        /* Mã Spotify nằm dưới cùng của khối giữa */
        .spotify-box {
            width: 135px;
            height: 30px;
            background: #ffffff; 
            border: 1px solid #eee;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 8px;
            padding: 2px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }

        .spotify-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Vùng chứa ảnh vân tay bên phải */
        .right-back-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .back-photo-box {
            width: 115px;
            height: 115px;
            border: 3px solid #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(244, 143, 177, 0.15);
            background: #fce4ec;
        }

        .back-photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- ĐÁP ỨNG DI ĐỘNG --- */
        @media (max-width: 480px) {
            .card {
                width: 340px;
                height: 210px;
                border-radius: 15px;
            }
            .front-top { height: 55px; }
            .logo-area { top: 12px; left: 15px; padding: 4px 12px; }
            .logo-text { font-size: 12px; }
            .front-body { padding: 10px 15px; height: calc(100% - 55px); }
            .best-couple-title { font-size: 14px; }
            .right-zone { margin-top: -5px; width: 95px; gap: 6px;}
            .photo-box { width: 85px; height: 85px; border-radius: 10px; }
            .love-forever-box { font-size: 8px; padding: 2px 8px; }
            .field { font-size: 11px; }
            .label { width: 55px; }
            
            .back-top-bar { height: 14px; }
            .back-content { margin-top: 8px; gap: 2px; }
            .mini-heart-box { width: 14px; height: 14px; }
            .text-zone h3 { font-size: 11px; margin-bottom: 2px; }
            .text-zone p { font-size: 7.5px; max-width: 110px; line-height: 1.25; }
            .text-zone .purpose-title { font-size: 8px; margin-top: 2px; }
            .qr-box { width: 82px; height: 82px; border-radius: 8px; }
            .qr-hint { font-size: 7px; }
            .spotify-box { width: 95px; height: 22px; margin-top: 5px; }
            .back-photo-box { width: 82px; height: 82px; border-radius: 8px; }
        }
    </style>
</head>
<body>

    <div class="card front-card">
        <div class="front-top">
            <div class="logo-area">
                <div class="logo-text">Couple ID Card</div>
            </div>
        </div>
        
        <div class="front-body">
            <div class="info-fields">
                <div class="best-couple-title">Best Couple</div>
                
                <div class="field">
                    <div class="label">Id Card</div>
                    <div class="value">Hữu Duy & Như Quỳnh🍊</div>
                </div>
                <div class="field">
                    <div class="label">Age</div>
                    <div class="value">2008 & 2008</div>
                </div>
                <div class="field">
                    <div class="label">Rela</div>
                    <div class="value">Dating</div>
                </div>
                <div class="field">
                    <div class="label">Date</div>
                    <div class="value">07-03-2026</div>
                </div>
            </div>

            <div class="right-zone">
                <div class="photo-box">
                    <img src="memory 15.jpg" alt="Chỗ để ảnh cặp đôi">
                </div>
                <div class="love-forever-box">#loveyouforever</div>
            </div>
        </div>
        <div class="front-bottom-bar"></div>
    </div>

    <div class="card back-card">
        <div class="back-top-bar"></div>
        
        <div class="back-content">
            <div class="qr-zone">
                <div class="qr-box">
                    <img src="audio2.png" alt="Mã QR Ghi Âm">
                </div>
                <div class="qr-hint">Quét mã để kích hoạt giọng nói</div>
            </div>

            <div class="text-zone">
                <div class="mini-heart-box">
                    <img src="heart.png" alt="Icon tim nhỏ">
                </div>
                <h3>Couple ID Card</h3>
                <p>Dùng để nhận diện các cặp đôi đang trong một mối quan hệ.</p>
                <p class="purpose-title">Mục đích sử dụng:</p>
                <p>Khẳng định chủ quyền, vui lòng luôn mang theo bên mình.</p>
                
                <div class="spotify-box">
                    <img src="mã.png" alt="Spotify Code">
                </div>
            </div>

            <div class="right-back-zone">
                <div class="back-photo-box">
                    <img src="heart.png" alt="Chỗ để ảnh mặt sau">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
